<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tactile — Give your design soul</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/coolvetica" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #deeaf8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 56px;
    }

    .nav-logo {
      font-size: 22px;
      font-weight: 400;
      color: #111;
      letter-spacing: 0.01em;
      font-family: 'Coolvetica', sans-serif;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: #444;
      font-size: 15px;
      font-weight: 450;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #111; }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-signin {
      padding: 9px 22px;
      border: 1.5px solid #111;
      border-radius: 999px;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: #111;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: rgba(0,0,0,0.05); }

    .btn-getstarted {
      padding: 9px 22px;
      border: none;
      border-radius: 999px;
      background: #91bfed;
      font-size: 14px;
      font-weight: 500;
      color: #1a4a7a;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-getstarted:hover { background: #7aaee0; transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 56px 80px;
      gap: 40px;
      min-height: calc(100vh - 70px);
    }

    /* ── LEFT ── */
    .hero-left {
      flex: 0 0 auto;
      max-width: 460px;
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-heading {
      font-size: clamp(52px, 7vw, 76px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #0d1117;
      margin-bottom: 28px;
    }

    .hero-heading .highlight {
      color: #91bfed;
    }

    .hero-body {
      font-size: 16px;
      line-height: 1.65;
      color: #4a5568;
      max-width: 400px;
      margin-bottom: 40px;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 14px 28px;
      border: none;
      border-radius: 999px;
      background: #91bfed;
      font-size: 15px;
      font-weight: 600;
      color: #1a3a6a;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(100,160,220,0.35);
    }
    .btn-primary:hover {
      background: #7aaee0;
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(100,160,220,0.45);
    }

    .social-proof {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatars {
      display: flex;
    }
    .avatars img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #deeaf8;
      margin-left: -8px;
      object-fit: cover;
    }
    .avatars img:first-child { margin-left: 0; }

    .social-text {
      font-size: 13px;
      font-weight: 500;
      color: #5a7a9a;
    }

    /* ── RIGHT — IMAGE CARD ── */
    .hero-right {
      flex: 0 0 auto;
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.15s both;
    }

    .img-card {
      width: clamp(380px, 46vw, 520px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(80,130,200,0.18), 0 4px 16px rgba(0,0,0,0.08);
      transition: transform 0.4s cubic-bezier(.16,1,.3,1), box-shadow 0.4s;
    }

    .img-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 28px 70px rgba(80,130,200,0.24), 0 8px 20px rgba(0,0,0,0.1);
    }

    .img-card img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="nav-logo">tactile</span>
    <ul class="nav-links">
      <li><a href="#">Examples</a></li>
      <li><a href="#">Docs</a></li>
      <li><a href="#">Pricing</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-signin">Sign In</button>
      <button class="btn-getstarted">Get Started</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-left">
      <h1 class="hero-heading">
        Give your<br/>

      </h1>
      <p class="hero-body">
        Transform your ideas into meaningful products without technical barriers.
        Describe your vision with human words like "warm" or "approachable" –
        we'll create soulful interfaces that feel intentional, not cheap.
      </p>
      <div class="hero-actions">
        <button class="btn-primary">Start Building with Tactile</button>

            <svg width="32" height="32" viewBox="0 0 32 32" style="margin-left:-8px;border:2px solid #deeaf8;border-radius:50%"><circle cx="16" cy="16" r="16" fill="#f0a500"/><text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#fff" font-family="Inter,sans-serif">B</text></svg>
            <svg width="32" height="32" viewBox="0 0 32 32" style="margin-left:-8px;border:2px solid #deeaf8;border-radius:50%"><circle cx="16" cy="16" r="16" fill="#e05c8a"/><text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#fff" font-family="Inter,sans-serif">C</text></svg>
          </div>
          <span class="social-text">Design meets impact</span>
        </div>
      </div>
    </div>
